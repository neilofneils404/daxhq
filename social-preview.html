<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DAX HQ Social Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    >
    <style>
      :root {
        --bg-deep: #020711;
        --bg-mid: #09101d;
        --ice: #8cecff;
        --ice-bright: #dfffff;
        --ember: #ff6d3a;
        --ember-hot: #ffd36b;
        --text: #edf6ff;
        --muted: rgba(237, 246, 255, 0.72);
        --line: rgba(140, 236, 255, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #040912;
      }

      body {
        position: relative;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 20%, rgba(255, 109, 58, 0.18), transparent 24%),
          radial-gradient(circle at 72% 18%, rgba(140, 236, 255, 0.14), transparent 22%),
          radial-gradient(circle at 50% 65%, rgba(77, 152, 204, 0.12), transparent 40%),
          linear-gradient(180deg, #07101c 0%, #02050b 100%);
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background:
          linear-gradient(rgba(140, 236, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(140, 236, 255, 0.05) 1px, transparent 1px);
        background-size: 64px 64px;
        opacity: 0.16;
      }

      body::after {
        background:
          radial-gradient(circle at center, transparent 45%, rgba(0, 0, 0, 0.42) 100%);
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        padding: 42px 46px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
      }

      .brand {
        max-width: 700px;
      }

      .eyebrow,
      .label {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 0.38em;
        text-transform: uppercase;
      }

      h1,
      .boss-title,
      .score-value,
      .cta {
        margin: 0;
        font-family: "Orbitron", sans-serif;
        text-transform: uppercase;
      }

      h1 {
        margin-top: 10px;
        font-size: 72px;
        line-height: 0.92;
        letter-spacing: 0.05em;
      }

      .subtitle {
        margin: 18px 0 0;
        max-width: 520px;
        font-size: 26px;
        line-height: 1.2;
        color: var(--muted);
      }

      .status {
        display: flex;
        gap: 12px;
      }

      .status-block {
        min-width: 110px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(8, 16, 29, 0.76), rgba(8, 16, 29, 0.4));
        backdrop-filter: blur(16px);
      }

      .score-value {
        margin-top: 8px;
        font-size: 24px;
        letter-spacing: 0.04em;
      }

      .arena {
        position: absolute;
        inset: 0;
      }

      .core-glow {
        position: absolute;
        left: 54%;
        top: 56%;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background:
          radial-gradient(circle, rgba(140, 236, 255, 0.36), rgba(140, 236, 255, 0.06) 45%, transparent 72%);
      }

      .core-ring,
      .core-ring::before,
      .core-ring::after {
        position: absolute;
        border-radius: 50%;
        content: "";
      }

      .core-ring {
        left: 54%;
        top: 56%;
        width: 132px;
        height: 132px;
        transform: translate(-50%, -50%);
        border: 8px solid rgba(140, 236, 255, 0.78);
        box-shadow: 0 0 44px rgba(140, 236, 255, 0.18);
      }

      .core-ring::before {
        inset: 20px;
        border: 4px solid rgba(223, 255, 255, 0.92);
      }

      .core-ring::after {
        inset: -26px;
        border: 4px solid rgba(255, 211, 107, 0.48);
        clip-path: inset(0 0 36% 0);
      }

      .saber {
        position: absolute;
        height: 14px;
        border-radius: 999px;
        transform-origin: left center;
        box-shadow: 0 0 30px currentColor;
      }

      .saber::before,
      .saber::after {
        content: "";
        position: absolute;
      }

      .saber::before {
        left: -16px;
        top: 50%;
        width: 24px;
        height: 10px;
        transform: translateY(-50%);
        border-radius: 999px;
        background: #1a2232;
        box-shadow: 0 0 0 2px rgba(255, 211, 107, 0.5);
      }

      .saber::after {
        inset: 3px 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
      }

      .saber-blue {
        left: 44%;
        top: 69%;
        width: 250px;
        color: var(--ice);
        background: rgba(140, 236, 255, 0.9);
        transform: rotate(-56deg);
      }

      .saber-red {
        left: 63%;
        top: 33%;
        width: 274px;
        color: #ff7862;
        background: rgba(255, 109, 58, 0.92);
        transform: rotate(138deg);
      }

      .boss-panel {
        position: absolute;
        right: 44px;
        top: 118px;
        width: 314px;
        padding: 16px 18px 18px;
        border: 1px solid rgba(255, 109, 58, 0.22);
        background:
          linear-gradient(135deg, rgba(255, 109, 58, 0.12), transparent 34%),
          linear-gradient(180deg, rgba(7, 14, 26, 0.82), rgba(4, 8, 16, 0.55));
      }

      .boss-title {
        margin-top: 6px;
        font-size: 34px;
        line-height: 0.96;
      }

      .boss-bar {
        margin-top: 14px;
        height: 12px;
        border: 1px solid rgba(255, 109, 58, 0.24);
        background: rgba(255, 255, 255, 0.08);
      }

      .boss-bar > span {
        display: block;
        width: 74%;
        height: 100%;
        background: linear-gradient(90deg, #ff4a2a, #ffd36b);
        box-shadow: 0 0 34px rgba(255, 109, 58, 0.4);
      }

      .logo {
        position: absolute;
        left: 52px;
        bottom: 46px;
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .logo-mark {
        position: relative;
        width: 92px;
        aspect-ratio: 1;
        border-radius: 50%;
        display: grid;
        place-items: center;
        border: 1px solid rgba(140, 236, 255, 0.28);
        background:
          radial-gradient(circle at center, rgba(140, 236, 255, 0.18), rgba(7, 14, 26, 0.78));
        box-shadow:
          0 0 36px rgba(140, 236, 255, 0.16),
          inset 0 0 24px rgba(255, 109, 58, 0.1);
      }

      .logo-mark::before,
      .logo-mark::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 50%;
      }

      .logo-mark::before {
        border: 1px solid rgba(255, 109, 58, 0.22);
      }

      .logo-mark::after {
        inset: -12px;
        border: 1px solid rgba(140, 236, 255, 0.2);
      }

      .logo-mark span,
      .logo-mark strong {
        display: block;
        text-align: center;
        font-family: "Orbitron", sans-serif;
        text-transform: uppercase;
      }

      .logo-mark span {
        font-size: 14px;
        letter-spacing: 0.28em;
        color: var(--muted);
      }

      .logo-mark strong {
        margin-top: 2px;
        font-size: 34px;
        letter-spacing: 0.08em;
      }

      .cta {
        font-size: 24px;
        letter-spacing: 0.16em;
      }

      .footer {
        margin-top: 8px;
        color: var(--muted);
        font-size: 20px;
      }

      .spark {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        box-shadow: 0 0 20px currentColor;
      }

      .spark.a { left: 64%; top: 34%; color: #ffd36b; }
      .spark.b { left: 66%; top: 37%; color: #ff9b73; }
      .spark.c { left: 49%; top: 67%; color: #dfffff; }
      .spark.d { left: 53%; top: 64%; color: #8cecff; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="topbar">
        <div class="brand">
          <p class="eyebrow">DAX HQ</p>
          <h1>Mouse Saber Arena</h1>
          <p class="subtitle">Deflect blaster fire. Parry saber raiders. Break the boss.</p>
        </div>

        <div class="status" aria-hidden="true">
          <div class="status-block">
            <p class="label">Score</p>
            <p class="score-value">8327</p>
          </div>
          <div class="status-block">
            <p class="label">Combo</p>
            <p class="score-value">15x</p>
          </div>
          <div class="status-block">
            <p class="label">Phase</p>
            <p class="score-value">Boss 02</p>
          </div>
        </div>
      </div>

      <div class="arena" aria-hidden="true">
        <div class="core-glow"></div>
        <div class="core-ring"></div>
        <div class="saber saber-blue"></div>
        <div class="saber saber-red"></div>
        <div class="boss-panel">
          <p class="eyebrow">Boss Round 02 // Guard 3/5</p>
          <p class="boss-title">Chrome<br>Reaper</p>
          <div class="boss-bar"><span></span></div>
        </div>
        <span class="spark a"></span>
        <span class="spark b"></span>
        <span class="spark c"></span>
        <span class="spark d"></span>
      </div>

      <div class="logo">
        <div class="logo-mark">
          <div>
            <span>DAX</span>
            <strong>HQ</strong>
          </div>
        </div>
        <div>
          <p class="cta">Fast Mouse Duels For Dax And Friends</p>
          <p class="footer">daxhq.com</p>
        </div>
      </div>
    </div>
  </body>
</html>
